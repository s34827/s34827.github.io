<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>หน้าแนะนำตัวของซูปเปอร์ค้าฟ</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at 20% 20%, rgba(168,85,247,.35), transparent 30%),
    radial-gradient(circle at 80% 30%, rgba(147,51,234,.30), transparent 35%),
    radial-gradient(circle at 50% 80%, rgba(109,40,217,.30), transparent 30%),
    linear-gradient(135deg,#05030d,#12081f,#2d0b52,#05030d);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
}
/* พื้นหลังเคลื่อนไหว */
@keyframes bgMove{
0%{
background-position:0% 50%;
}
50%{
background-position:100% 50%;
}
100%{
background-position:0% 50%;
}
}
/* ดาว */
.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#c084fc 1px, transparent 1px);
background-size:60px 60px,100px 100px;
opacity:.7;
animation:starMove 35s linear infinite;
}
@keyframes starMove{
from{
transform:translateY(0);
}
to{
transform:translateY(-250px);
}
}
/* วงกลม Glass */
.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
animation:float 8s ease-in-out infinite;
}
.c1{
width:220px;
height:220px;
top:8%;
left:8%;
}
.c2{
width:150px;
height:150px;
bottom:10%;
right:10%;
animation-delay:2s;
}
@keyframes float{
50%{
transform:translateY(-25px);
}
}
/* การ์ด */
.card{
width:450px;
padding:45px;
text-align:center;
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
border-radius:25px;
box-shadow:
0 0 25px rgba(147,51,234,.35),
0 0 60px rgba(109,40,217,.2);
animation:fadeUp 1s;
color:white;
}
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(50px);
}
to{
opacity:1;
transform:translateY(0);
}
}
h1{
color:#d8b4fe;
font-size:34px;
margin-bottom:20px;
text-shadow:0 0 15px rgba(192,132,252,.5);
}
p{
font-size:18px;
line-height:1.8;
margin:12px 0;
color:#eeeeee;
}
strong{
color:#c084fc;
}
.btn{
display:inline-block;
margin-top:25px;
padding:14px 30px;
border-radius:50px;
text-decoration:none;
background:linear-gradient(90deg,#6d28d9,#9333ea);
color:white;
font-weight:bold;
transition:.3s;
box-shadow:0 0 20px rgba(147,51,234,.5);
}
.btn:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 0 35px rgba(192,132,252,.8);
}
</style>
</head>
<body>
<div class="stars"></div>
<div class="circle c1"></div>
<div class="circle c2"></div>
<div class="card">
<h1>ยินดีต้อนรับสู่โปรไฟล์ของซูปเปอร์ค้าฟ</h1>
<p>
สวัสดีครับ! ผมชื่อ <strong>ณัฐนันท์ (Nattanan)</strong>
</p>
<p>
กำลังศึกษาอยู่แผนการเรียน <strong>วิทย์–คณิต Gifted</strong>
</p>
<p>
สนใจด้านการแพทย์ เภสัชศาสตร์ และกระบวนการทางวิทยาศาสตร์
</p>
<p>
นี่คือเว็บไซต์แรกของผมที่สร้างบน GitHub Pages 🚀
</p>
</div>

</div>
